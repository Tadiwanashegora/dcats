{% extends "shared/base.html" %}
{% block title %}Add Student{% endblock %}

{% block content %}
<div class="page-header">
  <h2>🎓 Add New Student</h2>
  <p>Fill in the details to register a new student in the system.</p>
  <a href="{{ url_for('admin.index') }}" class="btn btn-secondary btn-sm">← Back to Manage</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('admin.add_student') }}">

    <div class="form-row">
      <div class="form-group">
        <label for="username">Student Number *</label>
        <input type="text" id="username" name="username"
               placeholder="e.g. 223010007" required />
        <small>This will be used as the login username.</small>
      </div>
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name"
               placeholder="e.g. John Shikongo" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email"
               placeholder="e.g. john@nust.na" required />
      </div>
      <div class="form-group">
        <label for="course">Course / Programme *</label>
        <input type="text" id="course" name="course"
               placeholder="e.g. BIT, BCom, BEng" required />
      </div>
    </div>

    <div class="form-group" style="max-width:340px;">
      <label for="password">Password *</label>
      <input type="password" id="password" name="password"
             placeholder="Set a login password" required />
      <small>Student will use this to log in.</small>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">✅ Add Student</button>
      <a href="{{ url_for('admin.index') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
