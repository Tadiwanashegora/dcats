{% extends "shared/base.html" %}
{% block title %}Add Course{% endblock %}

{% block content %}
<div class="page-header">
  <h2>📚 Add New Course</h2>
  <p>Fill in the details to add a new course to the system.</p>
  <a href="{{ url_for('admin.index') }}" class="btn btn-secondary btn-sm">← Back to Manage</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('admin.add_course') }}">

    <div class="form-row">
      <div class="form-group">
        <label for="code">Course Code *</label>
        <input type="text" id="code" name="code"
               placeholder="e.g. MCS501S" required />
        <small>Must be unique. Will be converted to uppercase.</small>
      </div>
      <div class="form-group">
        <label for="course_name">Course Name *</label>
        <input type="text" id="course_name" name="course_name"
               placeholder="e.g. Mobile Computing Systems" required />
      </div>
    </div>

    <div class="form-group" style="max-width:400px;">
      <label for="lecturer_id">Assign Lecturer *</label>
      <select id="lecturer_id" name="lecturer_id" required>
        <option value="">-- Select a lecturer --</option>
        {% for lec in lecturers %}
          <option value="{{ lec.id }}">{{ lec.name }} ({{ lec.user.username }})</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">✅ Add Course</button>
      <a href="{{ url_for('admin.index') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
