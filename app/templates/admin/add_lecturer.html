{% extends "shared/base.html" %}
{% block title %}Add Lecturer{% endblock %}

{% block content %}
<div class="page-header">
  <h2>👨‍🏫 Add New Lecturer</h2>
  <p>Fill in the details to register a new lecturer in the system.</p>
  <a href="{{ url_for('admin.index') }}" class="btn btn-secondary btn-sm">← Back to Manage</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('admin.add_lecturer') }}">

    <div class="form-row">
      <div class="form-group">
        <label for="username">Staff Username *</label>
        <input type="text" id="username" name="username"
               placeholder="e.g. staff03" required />
        <small>This will be used as the login username.</small>
      </div>
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name"
               placeholder="e.g. Dr. Iipinge" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email"
               placeholder="e.g. iipinge@nust.na" required />
      </div>
      <div class="form-group">
        <label for="password">Password *</label>
        <input type="password" id="password" name="password"
               placeholder="Set a login password" required />
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">✅ Add Lecturer</button>
      <a href="{{ url_for('admin.index') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
