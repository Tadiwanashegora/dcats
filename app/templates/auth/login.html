{% extends "shared/base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="login-wrapper">
  <div class="login-card">
    <h1>🎓 DCATS</h1>
    <p class="subtitle">Digital Class Attendance Tracking System</p>
    <p class="subtitle">Namibia University of Science &amp; Technology</p>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label for="username">Username / Student Number</label>
        <input type="text" id="username" name="username"
               placeholder="Enter your username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>

    <div class="login-divider">
      <span>Don't have an account?</span>
    </div>

    <div class="register-links">
      <a href="{{ url_for('auth.register_student') }}" class="btn btn-outline btn-full">
        🎓 Register as Student
      </a>
      <a href="{{ url_for('auth.register_lecturer') }}" class="btn btn-outline btn-full" style="margin-top:0.6rem;">
        👨‍🏫 Register as Lecturer
      </a>
    </div>

  </div>
</div>
{% endblock %}
