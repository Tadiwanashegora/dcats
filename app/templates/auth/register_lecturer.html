{% extends "shared/base.html" %}
{% block title %}Register as Lecturer{% endblock %}

{% block content %}
<div class="login-wrapper">
  <div class="login-card" style="max-width:480px;">
    <h1>👨‍🏫 Lecturer Register</h1>
    <p class="subtitle">Create your DCATS lecturer account</p>

    <form method="POST" action="{{ url_for('auth.register_lecturer') }}" style="text-align:left; margin-top:1.5rem;">

      <div class="form-group">
        <label for="username">Staff Username *</label>
        <input type="text" id="username" name="username"
               placeholder="e.g. staff04" required autofocus />
      </div>

      <div class="form-group">
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name"
               placeholder="e.g. Dr. Hamutenya" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email"
               placeholder="e.g. hamutenya@nust.na" required />
      </div>

      <div class="form-group">
        <label for="password">Password *</label>
        <input type="password" id="password" name="password"
               placeholder="Choose a password" required />
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password *</label>
        <input type="password" id="confirm" name="confirm"
               placeholder="Repeat your password" required />
      </div>

      <button type="submit" class="btn btn-primary btn-full">✅ Create Account</button>
    </form>

    <div class="login-divider"><span>Already have an account?</span></div>
    <a href="{{ url_for('auth.login') }}" class="btn btn-outline btn-full">← Back to Login</a>
  </div>
</div>
{% endblock %}
